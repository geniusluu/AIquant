      max: 'dataMax',
      axisLine: { lineStyle: { color: '#ddd' } }
    },
    {
      type: 'category',
      gridIndex: 1,
      data: rawData.dates,
      scale: true,
      boundaryGap: true,
      splitLine: { show: false },
      axisLabel: { show: false },
      axisTick: { show: false },
      min: 'dataMin',
      max: 'dataMax',
      axisLine: { lineStyle: { color: '#ddd' } }
    }
  ],
  yAxis: [
    {
      scale: true,
      splitLine: { lineStyle: { color: '#f0f0f0' } },
      axisLabel: { color: '#888', fontSize: 11, formatter: function(v) { return '¥' + v; } },
    },
    {
      gridIndex: 1,
      splitNumber: 2,
      axisLabel: { color: '#888', fontSize: 11, formatter: function(v) { return (v/10000).toFixed(1)+'万'; } },
      splitLine: { lineStyle: { color: '#f0f0f0' } },
    }
  ],
  dataZoom: [
    {
      type: 'inside',
      xAxisIndex: [0, 1],
      start: 60,
      end: 100
    },
    {
      show: true,
      type: 'slider',
      xAxisIndex: [0, 1],
      top: '94%',
      start: 60,
      end: 100,
      height: 20,
      borderColor: '#e0e0e0',
      fillerColor: 'rgba(26,115,232,0.1)',
      handleStyle: { color: '#1a73e8' }
    }
  ],
  series: [
    {
      name: '日K',
      type: 'candlestick',
      data: rawData.ohlc,
      itemStyle: {
        color: upColor,
        color0: downColor,
        borderColor: upColor,
        borderColor0: downColor
      }
    },
    {
      name: 'MA5',
      type: 'line',
      data: rawData.ma5,
      smooth: true,
      showSymbol: false,
      lineStyle: { color: '#FFB900', width: 1.5 },
      z: 5
    },
    {
      name: 'MA20',
      type: 'line',
      data: rawData.ma20,
      smooth: true,
      showSymbol: false,
      lineStyle: { color: '#7B61FF', width: 1.5 },
      z: 5
    },
    {
      name: '成交量',
      type: 'bar',
      xAxisIndex: 1,
      yAxisIndex: 1,
      data: rawData.vols.map((v, i) => ({
        value: v,
        itemStyle: { color: rawData.vol_colors[i] }
      })),
    }
  ]
});

window.addEventListener('resize', () => chart.resize());
</script>
